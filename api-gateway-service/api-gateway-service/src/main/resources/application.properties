spring.application.name=api-gateway-service

server.port=8000

#eureka config
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
#no automatic routes, need to creat it
spring.cloud.gateway.discovery.locator.enabled=false
spring.cloud.netflix.eureka.discovery.enabled=true

#Define static router for product service
# Route 1
spring.cloud.gateway.routes[0].id=product-service-1
spring.cloud.gateway.routes[0].uri=lb://product-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/product

# Route 2
spring.cloud.gateway.routes[1].id=product-service-2
spring.cloud.gateway.routes[1].uri=lb://product-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/product/**

#Define static router for order service
spring.cloud.gateway.routes[2].id=order-service-1
spring.cloud.gateway.routes[2].uri=lb://order-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/orders

#Define static router for order service
spring.cloud.gateway.routes[3].id=order-service-2
spring.cloud.gateway.routes[3].uri=lb://order-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/orders/**

logging.level.org.springframework.cloud.gateway=TRACE

